services:
  # API: FastAPI Chatbot Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: claimly_rag:latest
    container_name: claimly_api
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    environment:
      - REDIS_URL=redis://redis-stack:6379
    networks:
      - claimly_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  # Worker: ARQ Background Processor for RAG
  worker:
    image: claimly_rag:latest
    restart: always
    deploy:
      replicas: 4
    env_file:
      - .env.docker
    environment:
      - REDIS_URL=redis://redis-stack:6379
    networks:
      - claimly_network
    command: arq app.workers.rag_worker.WorkerSettings

networks:
  claimly_network:
    external: true
