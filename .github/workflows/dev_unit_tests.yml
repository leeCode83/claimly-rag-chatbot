name: Modular Unit Tests (Dev)

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - category: "AI Service"
            test_path: "tests/unit/test_ai_service.py"
          - category: "KMS Service"
            test_path: "tests/unit/test_kms_service.py"
          - category: "Medical Record"
            test_path: "tests/unit/test_medical_record_service.py"
          - category: "Core & WebSocket"
            test_path: "tests/unit/test_redis_pool.py tests/unit/test_websocket.py"

    name: "Test: ${{ matrix.category }}"
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: "pip"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Pytest
      env:
        PYTHONPATH: .
        MOCK_AI: "true"
        MOCK_AUTH: "true"
        MOCK_IDENTITY: "true"
        APP_SECRET: "ci_test_secret_32_chars_long_long_long"
        SUPABASE_URL: "https://mock.supabase.co"
        SUPABASE_ANON_KEY: "mock_key"
        GEMINI_API_KEY: "mock_gemini_key"
        REDIS_URL: "redis://localhost:6379"
      run: |
        pytest ${{ matrix.test_path }} --cov=app --cov-append --cov-report=xml

    - name: Upload results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.category }}
        path: coverage.xml
