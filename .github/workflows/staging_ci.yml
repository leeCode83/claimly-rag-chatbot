name: Staging Modular CI & Load Test

on:
  push:
    branches: [ "staging" ]
  pull_request:
    branches: [ "staging" ]

jobs:
  unit-test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: "pip"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-mock pytest-cov

    - name: Run Unit Tests
      env:
        PYTHONPATH: .
        MOCK_AI: "true"
        MOCK_AUTH: "true"
        MOCK_IDENTITY: "true"
        REDIS_URL: "redis://localhost:6379"
        APP_SECRET: "ci_test_secret_32_chars_long_long_long"
        IDENTITY_API_URL: "http://mock.identity.co"
        MEDICAL_API_URL: "http://mock.medical.co"
        SUPABASE_URL: "https://mock.supabase.co"
        SUPABASE_KEY: "mock_key"
        GEMINI_API_KEY: "mock_gemini_key"
      run: |
        pytest tests/unit/ --cov=app --cov-report=xml

    - name: Upload results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: unit-test-results
        path: coverage.xml

  load-test:
    needs: unit-test
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: "pip"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Setup k6
      uses: grafana/setup-k6-action@v1

    - name: Start Services (API & Worker)
      env:
        PYTHONPATH: .
        MOCK_AI: "true"
        MOCK_AUTH: "true"
        MOCK_IDENTITY: "true"
        REDIS_URL: "redis://localhost:6379"
        APP_SECRET: "ci_test_secret_32_chars_long_long_long"
        IDENTITY_API_URL: "http://mock.identity.co"
        MEDICAL_API_URL: "http://mock.medical.co"
        SUPABASE_URL: "https://mock.supabase.co"
        SUPABASE_KEY: "mock_key"
        GEMINI_API_KEY: "mock_gemini_key"
        WINLOOP_MOCK: "true"
      run: |
        # Start API in background
        nohup uvicorn app.main:app --port 8000 --host 0.0.0.0 > api.log 2>&1 &
        # Start Worker in background
        nohup arq app.workers.rag_worker.WorkerSettings > worker.log 2>&1 &
        
        # Wait for services to be ready
        echo "Waiting for API health check..."
        timeout 30s bash -c 'until curl -s http://localhost:8000/docs > /dev/null; do sleep 1; done' || (cat api.log && exit 1)
        echo "API and Worker are UP."

    - name: Run k6 Load Test
      run: |
        k6 run tests/load/chat_load_test.js

    - name: Debug logs on failure
      if: failure()
      run: |
        echo "=== API LOGS ==="
        cat api.log
        echo "=== WORKER LOGS ==="
        cat worker.log
